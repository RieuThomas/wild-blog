<section>
    @for(article of articles; track article.id) {
        @if(article.isPublished){
            <article [ngClass]="{'popular-article' : article.likeCount > 200}">
                <div class="img-container">
                    <img [src] = "article.image" [alt]="article.title">
                    <p>{{ article.categoryName }}</p>
                </div>              
                <p class="date">{{ article.createdAt | date:'shortDate' }}</p>           
                <h3>{{ article.title }}</h3>
                <p>{{ article.content }}</p>
            </article>
        }
    }
</section>
